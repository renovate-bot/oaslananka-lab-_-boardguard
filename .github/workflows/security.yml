name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "31 3 * * 2"

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  security:
    if: github.repository == 'oaslananka-lab/boardguard' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm
      - name: Install pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
      - name: Dependency audit
        shell: bash
        run: |
          set -euo pipefail
          pnpm audit --audit-level moderate
      - name: Workflow lint
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Workflow security lint
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --user zizmor==1.24.1
          "$HOME/.local/bin/zizmor" --offline --min-severity low .github/workflows
      - name: Secret scan
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .tools
          gh release download v8.30.1 --repo gitleaks/gitleaks --pattern 'gitleaks_8.30.1_linux_x64.tar.gz' --dir .tools
          tar -xzf .tools/gitleaks_8.30.1_linux_x64.tar.gz -C .tools gitleaks
          .tools/gitleaks detect --no-git --redact --source .
