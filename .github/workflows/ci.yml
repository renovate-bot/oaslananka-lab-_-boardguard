name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    if: github.repository == 'oaslananka-lab/boardguard' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
      - name: Install pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
      - name: Format check
        shell: bash
        run: |
          set -euo pipefail
          pnpm run format:check
      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          pnpm run lint
      - name: Typecheck
        shell: bash
        run: |
          set -euo pipefail
          pnpm run typecheck
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          pnpm run build
      - name: Unit and fixture tests
        shell: bash
        run: |
          set -euo pipefail
          pnpm test
          pnpm run scan:fixtures
      - name: Action build
        shell: bash
        run: |
          set -euo pipefail
          pnpm run action:build
          node scripts/validate-action-metadata.mjs
      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          node dist/cli/main.js version
          node dist/cli/main.js scan --path tests/fixtures/projects/safe-basic --format json --kicad-cli tests/fixtures/missing-tools/kicad-cli-not-installed > boardguard-smoke.json
      - name: Package content sanity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p boardguard-results
          pnpm pack --pack-destination boardguard-results
      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: boardguard-ci-${{ matrix.os }}
          path: |
            boardguard-results/**
            boardguard-smoke.json
          if-no-files-found: ignore
          retention-days: 7
