name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.repository == 'oaslananka-lab/boardguard'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: github.repository == 'oaslananka-lab/boardguard' && needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
      - name: Install and build
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
          corepack pnpm install --frozen-lockfile
          corepack pnpm run build
          corepack pnpm run action:build
          corepack pnpm run pack:check
          corepack pnpm run cli:smoke
          corepack pnpm run action:smoke
      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p boardguard-results
          corepack pnpm pack --pack-destination boardguard-results
          node scripts/generate-sbom.mjs boardguard-results/sbom.cdx.json
          (cd boardguard-results && sha256sum -- ./* > SHA256SUMS)
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: boardguard-results/*
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PLEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_PLEASE_TAG" boardguard-results/* --clobber
