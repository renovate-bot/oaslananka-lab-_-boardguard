version: "3"

tasks:
  format:
    cmds:
      - corepack pnpm run format
  format-check:
    cmds:
      - corepack pnpm run format:check
  lint:
    cmds:
      - corepack pnpm run lint
  typecheck:
    cmds:
      - corepack pnpm run typecheck
  test:
    cmds:
      - corepack pnpm test
  security:
    cmds:
      - corepack pnpm run security
      - corepack pnpm audit --audit-level moderate
  build:
    cmds:
      - corepack pnpm run build
      - corepack pnpm run action:build
  action:build:
    cmds:
      - corepack pnpm run action:build
  action:smoke:
    cmds:
      - corepack pnpm run action:smoke
  cli:smoke:
    cmds:
      - corepack pnpm run cli:smoke
  pack:check:
    cmds:
      - corepack pnpm run pack:check
  fixtures:
    cmds:
      - corepack pnpm run fixtures
  scan:fixtures:
    cmds:
      - corepack pnpm run scan:fixtures
  release:dry-run:
    cmds:
      - corepack pnpm run release:dry-run
  ci:
    cmds:
      - corepack pnpm run format:check
      - corepack pnpm run lint
      - corepack pnpm run typecheck
      - corepack pnpm run build
      - corepack pnpm test
      - corepack pnpm run action:build
      - corepack pnpm run pack:check
      - corepack pnpm run cli:smoke
      - corepack pnpm run action:smoke
      - corepack pnpm run scan:fixtures
      - corepack pnpm run security
      - corepack pnpm run release:dry-run
